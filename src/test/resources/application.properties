# Default test profile: API key authentication enabled so security/rate-limit
# integration tests have a real ApiKeySecurityConfig + RateLimitFilter to assert
# against. Override with -Dapi.key.authentication.enabled=false to run a subset
# of tests against the PermitAllSecurityConfig fallback (rate-limit tests will
# self-skip via Assumptions when auth is off).
api.key.authentication.enabled=true
